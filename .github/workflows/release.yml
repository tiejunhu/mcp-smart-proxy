name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: msp
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: linux-x86_64
            runner: ubuntu-24.04
            archive_suffix: x86_64-unknown-linux-gnu
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            archive_suffix: aarch64-unknown-linux-gnu
          - label: macos-x86_64
            runner: macos-15-intel
            archive_suffix: x86_64-apple-darwin
          - label: macos-arm64
            runner: macos-15
            archive_suffix: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo files
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          archive_dir="${BINARY_NAME}-${version}-${{ matrix.target.archive_suffix }}"
          package_dir="$(mktemp -d)"
          cp "target/release/${BINARY_NAME}" "${package_dir}/"
          cp README.md "${package_dir}/"
          tar -czf "${archive_dir}.tar.gz" -C "${package_dir}" .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target.archive_suffix }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target.archive_suffix }}.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Check out default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*.tar.gz
          generate_release_notes: true

      - name: Render Homebrew formula
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          macos_arm64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-apple-darwin/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          macos_x86_64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-apple-darwin/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
          linux_arm64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz"
          linux_x86_64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"

          scripts/render-homebrew-formula.sh \
            "${version}" \
            "${BINARY_NAME}" \
            "$(sha256sum "${macos_arm64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${macos_x86_64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${linux_arm64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${linux_x86_64_archive}" | awk '{print $1}')"

      - name: Commit Homebrew formula update
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula/msp.rb; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/msp.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
