name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: mcp-smart-proxy
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: linux-x86_64
            runner: ubuntu-24.04
            archive_suffix: x86_64-unknown-linux-gnu
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            archive_suffix: aarch64-unknown-linux-gnu
          - label: macos-x86_64
            runner: macos-15-intel
            archive_suffix: x86_64-apple-darwin
          - label: macos-arm64
            runner: macos-15
            archive_suffix: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo files
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          archive_dir="${BINARY_NAME}-${version}-${{ matrix.target.archive_suffix }}"
          mkdir -p "${archive_dir}"
          cp "target/release/${BINARY_NAME}" "${archive_dir}/"
          cp README.md "${archive_dir}/"
          tar -czf "${archive_dir}.tar.gz" "${archive_dir}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target.archive_suffix }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target.archive_suffix }}.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*.tar.gz
          generate_release_notes: true
