name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: msp
  HOMEBREW_TAP_REPOSITORY: cybershape/homebrew-mcp-smart-proxy
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux:
    name: Build Linux Archives
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo files
        uses: Swatinem/rust-cache@v2

      - name: Install Linux cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu

      - name: Build Linux release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --release --locked --bin "${BINARY_NAME}" --target x86_64-unknown-linux-gnu
          cargo build --release --locked --bin "${BINARY_NAME}" --target aarch64-unknown-linux-gnu

      - name: Package Linux archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            archive_dir="${BINARY_NAME}-${version}-${target}"
            package_dir="$(mktemp -d)"
            cp "target/${target}/release/${BINARY_NAME}" "${package_dir}/"
            cp README.md "${package_dir}/"
            tar -czf "${archive_dir}.tar.gz" -C "${package_dir}" .
          done

      - name: Upload Linux packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-linux
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz

  build-macos:
    name: Build macOS Archives
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo files
        uses: Swatinem/rust-cache@v2

      - name: Build macOS release binaries
        run: |
          set -euo pipefail
          cargo build --release --locked --bin "${BINARY_NAME}" --target aarch64-apple-darwin
          cargo build --release --locked --bin "${BINARY_NAME}" --target x86_64-apple-darwin

      - name: Package macOS archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            archive_dir="${BINARY_NAME}-${version}-${target}"
            package_dir="$(mktemp -d)"
            cp "target/${target}/release/${BINARY_NAME}" "${package_dir}/"
            cp README.md "${package_dir}/"
            tar -czf "${archive_dir}.tar.gz" -C "${package_dir}" .
          done

      - name: Upload macOS packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-macos
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-macos
    environment:
      name: HOMEBREW_TAP_GITHUB_TOKEN

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*.tar.gz
          generate_release_notes: true

      - name: Require tap repository token
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to push Formula/msp.rb to ${HOMEBREW_TAP_REPOSITORY}" >&2
            exit 1
          fi

      - name: Check out Homebrew tap repository
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v6
        with:
          path: homebrew-tap
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Sync Homebrew tap formula
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          macos_arm64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-macos/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          macos_x86_64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-macos/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
          linux_arm64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-linux/${BINARY_NAME}-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz"
          linux_x86_64_archive="dist/${BINARY_NAME}-${GITHUB_REF_NAME}-linux/${BINARY_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"

          scripts/render-homebrew-formula.sh \
            "homebrew-tap/Formula/msp.rb" \
            "${version}" \
            "${BINARY_NAME}" \
            "$(sha256sum "${macos_arm64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${macos_x86_64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${linux_arm64_archive}" | awk '{print $1}')" \
            "$(sha256sum "${linux_x86_64_archive}" | awk '{print $1}')"

          if git -C homebrew-tap diff --quiet -- Formula/msp.rb; then
            exit 0
          fi

          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Formula/msp.rb
          git -C homebrew-tap commit -m "Update msp formula for ${GITHUB_REF_NAME}"
          git -C homebrew-tap push origin HEAD
